<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumio — регистрация и вход</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;540;560;580;600;620;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Neutrals */
    --paper: oklch(0.985 0.004 85);
    --surface: oklch(1 0 0);
    --line: oklch(0.92 0.006 260);
    --line-strong: oklch(0.86 0.008 260);
    --mute: oklch(0.55 0.01 260);
    --ink: oklch(0.22 0.02 260);
    --ink-soft: oklch(0.32 0.02 260);

    /* Primary — tweakable, set at runtime */
    --primary: oklch(0.60 0.13 175);
    --primary-ink: oklch(0.38 0.13 175);
    --primary-hover: oklch(0.54 0.14 175);
    --primary-soft: oklch(0.96 0.03 175);
    --primary-soft-ink: oklch(0.42 0.12 175);
    --primary-ring: oklch(0.72 0.13 175 / 0.35);
    --primary-edge: oklch(0.78 0.08 175);
    --primary-hue: 175;

    /* Semantic */
    --danger: oklch(0.58 0.17 25);
    --danger-bg: oklch(0.97 0.02 25);
    --success: oklch(0.62 0.13 155);

    --focus-ring: 0 0 0 4px var(--primary-ring);
    --radius-field: 12px;
  }

  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.45;
  }

  button { font-family: inherit; }
  a { color: var(--primary-ink); }

  ::selection {
    background: var(--primary-soft);
    color: var(--primary-ink);
  }

  @keyframes lumio-spin { to { transform: rotate(360deg); } }
  @keyframes lumio-wave {
    0%, 100% { transform: scaleY(0.35); }
    50% { transform: scaleY(1); }
  }
  @keyframes lumio-fadein {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 860px) {
    .lumio-hero-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .lumio-hero-visual { order: -1; max-width: 100%; }
    .lumio-auth-layout { grid-template-columns: 1fr !important; }
    .lumio-auth-decor { display: none !important; }
  }
  @media (max-width: 520px) {
    .lumio-role-grid { grid-template-columns: 1fr !important; }
    .lumio-name-grid { grid-template-columns: 1fr !important; }
  }
  @media (min-width: 560px) {
    .lumio-user-name-block { display: block !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
